<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mind Map — Life Processes</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@400;500&family=Nunito:wght@600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #080f1e; font-family: 'Nunito', sans-serif; overflow: hidden; width: 100vw; height: 100vh; }
canvas { position: absolute; inset: 0; }

#ui {
  position: absolute; top: 0; left: 0; right: 0;
  display: flex; justify-content: space-between; align-items: center;
  padding: .8rem 1.2rem; z-index: 10; pointer-events: none;
}
#ui h1 {
  font-family: 'Syne', sans-serif; font-size: 1.1rem; font-weight: 800;
  background: linear-gradient(135deg, #22c55e, #06b6d4, #f97316);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
#ui p { font-family: 'DM Mono', monospace; font-size: .68rem; color: #475569; margin-top: .1rem; }

.ctrl-bar {
  position: absolute; bottom: 1rem; left: 50%; transform: translateX(-50%);
  display: flex; gap: .5rem; z-index: 10;
}
.ctrl-btn {
  font-family: 'Syne', sans-serif; font-weight: 700; font-size: .75rem;
  padding: .4rem 1rem; border-radius: 99px;
  border: 1.5px solid #334155; background: rgba(30,41,59,.9);
  color: #94a3b8; cursor: pointer; transition: all .2s; pointer-events: all;
}
.ctrl-btn:hover { border-color: #64748b; color: #e2e8f0; }

/* tooltip */
#tooltip {
  position: absolute; z-index: 20; pointer-events: none;
  background: #1e293b; border: 1px solid #334155;
  border-radius: 12px; padding: .7rem 1rem;
  max-width: 260px; font-size: .82rem; color: #e2e8f0;
  line-height: 1.6; display: none;
  box-shadow: 0 8px 24px rgba(0,0,0,.6);
}
#tooltip strong { font-family: 'Syne', sans-serif; display: block; margin-bottom: .3rem; }
</style>
</head>
<body>

<div id="ui">
  <div>
    <h1>Life Processes</h1>
    <p>Class X · CBSE Biology · Mind Map — hover nodes to explore</p>
  </div>
</div>

<div class="ctrl-bar">
  <button class="ctrl-btn" onclick="zoom(1.2)">＋ Zoom</button>
  <button class="ctrl-btn" onclick="zoom(0.83)">－ Zoom</button>
  <button class="ctrl-btn" onclick="resetView()">⌖ Reset</button>
</div>

<div id="tooltip"></div>
<canvas id="c"></canvas>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const tip = document.getElementById('tooltip');

let W, H, scale = 1, ox = 0, oy = 0;
let dragging = false, dragStart = {x:0,y:0}, dragOrigin = {x:0,y:0};

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  ox = W/2; oy = H/2;
  draw();
}
window.addEventListener('resize', resize);

// ── NODE DATA ──
const CENTER = {
  id:'c', label:'Life\nProcesses', x:0, y:0, r:58,
  color:'#0c1a2e', stroke:'#06b6d4', textColor:'#67e8f9', fontSize:13
};

const BRANCHES = [
  {
    id:'nutr', label:'Nutrition', x:-310, y:-190, r:44,
    color:'#052e16', stroke:'#22c55e', textColor:'#86efac',
    info:'Obtaining and utilising food for energy and growth.\nAutotrophic: make own food (plants, algae).\nHeterotrophic: depend on other organisms.\nAll life processes require energy from nutrition.',
    children:[
      { id:'n1', label:'Photo-\nsynthesis', x:-525, y:-318, r:35,
        color:'#052e16', stroke:'#4ade80', textColor:'#bbf7d0',
        info:'6CO₂ + 6H₂O →(chlorophyll/sunlight)→ C₆H₁₂O₆ + 6O₂\n\nLight reactions: Thylakoid membranes\n→ H₂O splits, O₂ released, ATP + NADPH formed\n\nDark reactions (Calvin cycle): Stroma\n→ CO₂ fixed into glucose using ATP + NADPH' },
      { id:'n2', label:'Autotrophic\nNutrition', x:-520, y:-178, r:35,
        color:'#052e16', stroke:'#4ade80', textColor:'#bbf7d0',
        info:'Organisms that synthesise own food from inorganic substances.\nPhotoautotrophs: Use light energy (plants, algae).\nChemoautotrophs: Use chemical energy (nitrifying bacteria).\nChlorophyll is the main photosynthetic pigment.' },
      { id:'n3', label:'Heterotrophic\nNutrition', x:-378, y:-365, r:35,
        color:'#052e16', stroke:'#4ade80', textColor:'#bbf7d0',
        info:'Cannot make own food — depend on others.\nHolozoic: Ingest solid food (humans, animals).\nSaprophytic: Feed on dead/decaying matter (fungi, bacteria).\nParasitic: Live on/in a living host (tapeworm, Cuscuta).\nMutualistic: Both organisms benefit.' },
      { id:'n4', label:'Human\nDigestion', x:-155, y:-358, r:35,
        color:'#052e16', stroke:'#4ade80', textColor:'#bbf7d0',
        info:'Mouth: Salivary amylase → starch to maltose.\nStomach: HCl (pH 2) + Pepsin → protein digestion.\nSmall intestine: Trypsin, lipase; bile emulsifies fats.\nVilli absorb nutrients into bloodstream.\nLarge intestine: Water absorption; faeces formed.' },
    ]
  },
  {
    id:'resp', label:'Respiration', x:310, y:-190, r:44,
    color:'#2d0a00', stroke:'#f97316', textColor:'#fdba74',
    info:'Breaking down glucose to release energy as ATP.\nOccurs in ALL living cells, 24 hours a day.\nMitochondria = "powerhouse of the cell".',
    children:[
      { id:'r1', label:'Aerobic', x:490, y:-318, r:35,
        color:'#2d0a00', stroke:'#fb923c', textColor:'#fed7aa',
        info:'Requires oxygen.\nC₆H₁₂O₆ + 6O₂ → 6CO₂ + 6H₂O + 38 ATP\nOccurs in mitochondria.\nStages: Glycolysis → Pyruvate oxidation → Krebs cycle → ETC.\nComplete oxidation; maximum energy yield.' },
      { id:'r2', label:'Anaerobic', x:535, y:-185, r:35,
        color:'#2d0a00', stroke:'#fb923c', textColor:'#fed7aa',
        info:'WITHOUT oxygen.\nYeast: C₆H₁₂O₆ → 2C₂H₅OH + 2CO₂ + 2 ATP\n→ Fermentation; used in baking, brewing\n\nMuscle cells: C₆H₁₂O₆ → 2 Lactic acid + 2 ATP\n→ Causes muscle cramps; oxygen debt formed.' },
      { id:'r3', label:'Breathing\nSystem', x:460, y:-52, r:35,
        color:'#2d0a00', stroke:'#fb923c', textColor:'#fed7aa',
        info:'Nose → Pharynx → Larynx → Trachea → Bronchi → Bronchioles → Alveoli\n\nAlveoli: 300 million, ~70 m² surface area.\nThin walls (1 cell thick), rich capillary network.\nO₂ diffuses in; CO₂ diffuses out (passive diffusion).' },
      { id:'r4', label:'Glycolysis', x:268, y:-362, r:35,
        color:'#2d0a00', stroke:'#fb923c', textColor:'#fed7aa',
        info:'First stage of cellular respiration.\nOccurs in CYTOPLASM (not mitochondria).\nGlucose (6C) → 2 Pyruvate (3C) + 2 ATP + 2 NADH\nDoes NOT require oxygen.\nCommon step for aerobic AND anaerobic respiration.' },
    ]
  },
  {
    id:'trans', label:'Transportation', x:-310, y:190, r:44,
    color:'#0c1445', stroke:'#3b82f6', textColor:'#93c5fd',
    info:'Movement of nutrients, gases, and waste products throughout an organism.\nEnsures every cell receives materials and waste is removed.',
    children:[
      { id:'t1', label:'Xylem\n(Plants)', x:-520, y:106, r:35,
        color:'#0c1445', stroke:'#60a5fa', textColor:'#bfdbfe',
        info:'Conducts WATER + dissolved minerals upward from roots to leaves.\nMovement: Unidirectional (roots → leaves).\nDriving force: Transpiration pull (cohesion-tension).\nRoot pressure also contributes.\nDead cells; hollow; no cytoplasm.' },
      { id:'t2', label:'Phloem\n(Plants)', x:-548, y:232, r:35,
        color:'#0c1445', stroke:'#60a5fa', textColor:'#bfdbfe',
        info:'Transports FOOD (sucrose, amino acids) from leaves to all parts.\nMovement: Bidirectional (up and down).\nProcess: Translocation.\nRequires ATP (active transport).\nLiving cells: Sieve tubes + companion cells.' },
      { id:'t3', label:'Human\nHeart', x:-455, y:348, r:35,
        color:'#0c1445', stroke:'#60a5fa', textColor:'#bfdbfe',
        info:'4 chambers: 2 atria + 2 ventricles.\nRight side → deoxygenated blood → Lungs (pulmonary circuit).\nLeft side → oxygenated blood → Body (systemic circuit).\nDouble circulation ensures high pressure delivery.\nHeartbeat ~70 times/minute at rest.' },
      { id:'t4', label:'Blood &\nLymph', x:-266, y:380, r:35,
        color:'#0c1445', stroke:'#60a5fa', textColor:'#bfdbfe',
        info:'Plasma (55%): Water, proteins, hormones, nutrients, gases.\nRBC (40%): Haemoglobin carries O₂ as oxyhaemoglobin.\nWBC (1%): Immune defence (phagocytes, lymphocytes).\nPlatelets: Blood clotting.\nLymph: Returns excess interstitial fluid to blood; immune role.' },
    ]
  },
  {
    id:'excr', label:'Excretion', x:310, y:190, r:44,
    color:'#2e1065', stroke:'#a855f7', textColor:'#d8b4fe',
    info:'Removal of harmful metabolic waste products.\nCO₂, urea, excess water, salts.\nMaintains homeostasis (internal balance).',
    children:[
      { id:'e1', label:'Human\nKidneys', x:500, y:106, r:35,
        color:'#2e1065', stroke:'#c084fc', textColor:'#ede9fe',
        info:'Pair of bean-shaped organs in abdomen.\nFunctional unit: Nephron (~1 million per kidney).\nFilters ~1700 L blood per day.\nProduces 1.5–1.8 L urine daily.\nRegulates water, salt (Na⁺), and blood pH.' },
      { id:'e2', label:'Nephron', x:548, y:242, r:35,
        color:'#2e1065', stroke:'#c084fc', textColor:'#ede9fe',
        info:'Glomerulus: Ultrafiltration under high blood pressure.\nBowman\'s Capsule: Collects glomerular filtrate.\nProximal Tubule: Selective reabsorption of glucose, amino acids, Na⁺.\nLoop of Henle: Water concentration.\nCollecting Duct: Final urine concentration (ADH controlled).' },
      { id:'e3', label:'In Plants', x:455, y:353, r:35,
        color:'#2e1065', stroke:'#c084fc', textColor:'#ede9fe',
        info:'O₂ and CO₂ exchanged via stomata and lenticels.\nExcess water removed by transpiration.\nWastes stored in: Vacuoles, resin ducts, bark, tannins, gums.\nLeaf fall in autumn removes accumulated waste.\nNO specialised excretory organ needed.' },
      { id:'e4', label:'Artificial\nKidney', x:268, y:385, r:35,
        color:'#2e1065', stroke:'#c084fc', textColor:'#ede9fe',
        info:'Haemodialysis machine used in kidney failure.\nBlood passed through semi-permeable cellophane tubing.\nDialysing fluid: Isotonic (same as normal plasma).\nUrea and excess salts diffuse out.\nRBC and proteins too large to pass the membrane.' },
    ]
  },
];

// build flat node list
const allNodes = [CENTER];
const allEdges = [];
BRANCHES.forEach(b => {
  allNodes.push(b);
  allEdges.push({from:'c', to:b.id});
  (b.children||[]).forEach(ch => {
    allNodes.push(ch);
    allEdges.push({from:b.id, to:ch.id});
  });
});

function getNode(id) { return allNodes.find(n=>n.id===id); }

// pan/zoom
canvas.addEventListener('mousedown', e => { dragging=true; dragStart={x:e.clientX,y:e.clientY}; dragOrigin={x:ox,y:oy}; });
canvas.addEventListener('mousemove', e => {
  if (dragging) { ox = dragOrigin.x+(e.clientX-dragStart.x); oy = dragOrigin.y+(e.clientY-dragStart.y); draw(); return; }
  const mx=(e.clientX-ox)/scale, my=(e.clientY-oy)/scale;
  let found=null;
  allNodes.forEach(n=>{ const dx=mx-n.x,dy=my-n.y; if(Math.sqrt(dx*dx+dy*dy)<n.r+6) found=n; });
  if(found && found.info){ tip.style.display='block'; tip.style.left=(e.clientX+14)+'px'; tip.style.top=(e.clientY-10)+'px';
    tip.innerHTML=`<strong>${found.label.replace(/\n/g,' ')}</strong>${found.info.replace(/\n/g,'<br>')}`;
    canvas.style.cursor='pointer';
  } else { tip.style.display='none'; canvas.style.cursor='grab'; }
});
canvas.addEventListener('mouseup', ()=>dragging=false);
canvas.addEventListener('mouseleave', ()=>{ dragging=false; tip.style.display='none'; });
canvas.addEventListener('wheel', e=>{ e.preventDefault(); const f=e.deltaY<0?1.1:0.91; zoomAt(f,e.clientX,e.clientY); },{passive:false});

// touch
let lastTouchDist=null;
canvas.addEventListener('touchstart',e=>{ if(e.touches.length===1){ dragging=true; dragStart={x:e.touches[0].clientX,y:e.touches[0].clientY}; dragOrigin={x:ox,y:oy}; }});
canvas.addEventListener('touchmove',e=>{ e.preventDefault();
  if(e.touches.length===1&&dragging){ ox=dragOrigin.x+(e.touches[0].clientX-dragStart.x); oy=dragOrigin.y+(e.touches[0].clientY-dragStart.y); draw(); }
  if(e.touches.length===2){ const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    if(lastTouchDist){ const cx=(e.touches[0].clientX+e.touches[1].clientX)/2,cy=(e.touches[0].clientY+e.touches[1].clientY)/2; zoomAt(d/lastTouchDist,cx,cy); }
    lastTouchDist=d; }
},{passive:false});
canvas.addEventListener('touchend',()=>{ dragging=false; lastTouchDist=null; });

function zoomAt(f,cx,cy){ const prev=scale; scale=Math.max(.3,Math.min(2.5,scale*f)); ox=cx-(cx-ox)*(scale/prev); oy=cy-(cy-oy)*(scale/prev); draw(); }
function zoom(f){ zoomAt(f,W/2,H/2); }
function resetView(){ scale=1; ox=W/2; oy=H/2; draw(); }

// ── DRAW ──
function draw() {
  ctx.clearRect(0,0,W,H);
  ctx.save();
  ctx.translate(ox,oy);
  ctx.scale(scale,scale);

  // background grid
  ctx.save();
  ctx.strokeStyle='rgba(255,255,255,.025)';
  ctx.lineWidth=1;
  for(let x=-1000;x<1000;x+=60){ ctx.beginPath();ctx.moveTo(x,-1000);ctx.lineTo(x,1000);ctx.stroke(); }
  for(let y=-1000;y<1000;y+=60){ ctx.beginPath();ctx.moveTo(-1000,y);ctx.lineTo(1000,y);ctx.stroke(); }
  ctx.restore();

  // edges
  allEdges.forEach(e=>{
    const a=getNode(e.from),b=getNode(e.to);
    if(!a||!b)return;
    const grd=ctx.createLinearGradient(a.x,a.y,b.x,b.y);
    grd.addColorStop(0,a.stroke+'88');
    grd.addColorStop(1,b.stroke+'44');
    ctx.beginPath();
    const cx=(a.x+b.x)/2, cy=(a.y+b.y)/2-30;
    ctx.moveTo(a.x,a.y);
    ctx.quadraticCurveTo(cx,cy,b.x,b.y);
    ctx.strokeStyle=grd;
    ctx.lineWidth=e.from==='c'?2.5:1.5;
    ctx.setLineDash(e.from==='c'?[]:[4,4]);
    ctx.stroke();
    ctx.setLineDash([]);
  });

  // nodes
  allNodes.forEach(n=>{
    // glow
    ctx.save();
    ctx.shadowColor=n.stroke;
    ctx.shadowBlur=n.id==='c'?30:16;
    ctx.beginPath(); ctx.arc(n.x,n.y,n.r,0,Math.PI*2);
    ctx.fillStyle=n.color;
    ctx.fill();
    ctx.restore();

    // border
    ctx.beginPath(); ctx.arc(n.x,n.y,n.r,0,Math.PI*2);
    ctx.strokeStyle=n.stroke;
    ctx.lineWidth=n.id==='c'?3:2;
    ctx.stroke();

    // label
    ctx.fillStyle=n.textColor;
    ctx.font=`700 ${n.fontSize||11}px Nunito,sans-serif`;
    ctx.textAlign='center';
    ctx.textBaseline='middle';
    const lines=n.label.split('\n');
    const lh=14;
    const startY=n.y-(lines.length-1)*lh/2;
    lines.forEach((l,i)=>ctx.fillText(l,n.x,startY+i*lh));
  });

  ctx.restore();
}

resize();
</script>
</body>
</html>
