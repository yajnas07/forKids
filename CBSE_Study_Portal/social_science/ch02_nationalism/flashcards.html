<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flashcards — Nationalism in India</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Mono:wght@400;500&family=Lato:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0e0a04; --card:#1a1208; --card2:#221a0a;
    --border:#3a2e1a; --text:#e8d8b0; --muted:#8a7a5a;
    --gold:#f5c842; --orange:#f97316; --blue:#38bdf8;
    --green:#22c55e; --purple:#d946ef; --red:#ef4444;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--bg); color:var(--text); font-family:'Lato',sans-serif; min-height:100vh;
    display:flex; flex-direction:column; align-items:center; }

  body::before { content:''; position:fixed; inset:0; pointer-events:none;
    background:radial-gradient(ellipse 70% 50% at 50% 0%, rgba(245,200,66,.05) 0%, transparent 60%); }

  header { text-align:center; padding:1.8rem 1rem .8rem; }
  header h1 { font-family:'Playfair Display',serif; font-size:clamp(1.3rem,4vw,2rem); font-weight:900;
    color:var(--gold); letter-spacing:.3px; }
  header p { color:var(--muted); font-family:'DM Mono',monospace; font-size:.72rem; margin-top:.3rem; }

  /* progress */
  .prog-row { display:flex; align-items:center; gap:1rem; padding:.5rem 1rem .8rem; width:100%; max-width:560px; }
  .prog-bar { flex:1; height:5px; background:var(--border); border-radius:99px; overflow:hidden; }
  .prog-fill { height:100%; border-radius:99px;
    background:linear-gradient(90deg,var(--orange),var(--gold));
    transition:width .4s ease; }
  .prog-text { font-family:'DM Mono',monospace; font-size:.72rem; color:var(--muted); white-space:nowrap; }

  /* filters */
  .filters { display:flex; gap:.4rem; flex-wrap:wrap; justify-content:center; padding:.2rem 1rem .8rem; }
  .f-btn { font-family:'Playfair Display',serif; font-weight:700; font-size:.72rem;
    padding:.3rem .9rem; border-radius:3px; border:1px solid var(--border);
    background:var(--card); color:var(--muted); cursor:pointer; transition:all .2s; }
  .f-btn:hover { color:var(--text); }
  .f-btn.on { color:#0e0a04; border-color:transparent; }
  .f-all.on  { background:var(--muted); }
  .f-ncm.on  { background:var(--orange); }
  .f-cdm.on  { background:var(--blue); }
  .f-lead.on { background:var(--green); }
  .f-grp.on  { background:var(--purple); }
  .f-evt.on  { background:var(--gold); color:#0e0a04 !important; }

  /* card stage */
  .stage { width:100%; max-width:560px; padding:0 1rem; perspective:1200px; }

  .fc-wrap { width:100%; aspect-ratio:3/2; position:relative; cursor:pointer;
    transform-style:preserve-3d; transition:transform .55s cubic-bezier(.4,0,.2,1); }
  .fc-wrap.flipped { transform:rotateY(180deg); }

  .fc-face { position:absolute; inset:0; border-radius:16px;
    backface-visibility:hidden; -webkit-backface-visibility:hidden;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding:1.4rem; text-align:center; }
  .fc-front { background:var(--card); border:1px solid var(--border);
    box-shadow:0 8px 32px rgba(0,0,0,.6); }
  .fc-back  { transform:rotateY(180deg); background:var(--card);
    border:1px solid var(--border); box-shadow:0 8px 32px rgba(0,0,0,.6); }

  .fc-tag { font-family:'DM Mono',monospace; font-size:.65rem; font-weight:500;
    padding:.18rem .65rem; border-radius:2px; margin-bottom:.7rem; }
  .fc-q { font-family:'Playfair Display',serif; font-size:clamp(.88rem,2.4vw,1.1rem);
    font-weight:700; line-height:1.45; }
  .fc-hint { font-size:.68rem; color:var(--muted); margin-top:.5rem; font-family:'DM Mono',monospace; }
  .fc-flip-hint { position:absolute; bottom:.75rem; font-size:.65rem;
    font-family:'DM Mono',monospace; color:#3a2e1a; animation:pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:.4} 50%{opacity:1} }

  .fc-ans-lbl { font-family:'DM Mono',monospace; font-size:.65rem; color:var(--green); margin-bottom:.5rem; }
  .fc-ans { font-size:clamp(.78rem,2vw,.95rem); line-height:1.65; color:var(--text); }
  .fc-ans strong { color:var(--gold); }
  .fc-ans em { color:#93c5fd; font-style:normal; }
  .fc-date { font-family:'DM Mono',monospace; font-size:.78rem; color:var(--orange);
    background:rgba(249,115,22,.1); border:1px solid rgba(249,115,22,.2);
    border-radius:4px; padding:.2rem .6rem; margin-bottom:.5rem; }

  /* known badge */
  .known-badge { position:absolute; top:.7rem; right:.7rem;
    font-size:.62rem; font-family:'DM Mono',monospace; padding:.12rem .45rem; border-radius:2px; }
  .known   { background:rgba(34,197,94,.15); color:#4ade80; }
  .unknown { background:rgba(239,68,68,.1);  color:#f87171; }

  /* nav */
  .nav-row { display:flex; gap:.7rem; align-items:center; padding:1rem; }
  .nav-btn { font-family:'Playfair Display',serif; font-weight:700; font-size:.85rem;
    padding:.5rem 1.3rem; border-radius:4px; border:1px solid var(--border);
    background:var(--card); color:var(--muted); cursor:pointer; transition:all .2s; }
  .nav-btn:hover:not(:disabled) { border-color:#5a4a2a; color:var(--text); }
  .nav-btn:disabled { opacity:.3; cursor:default; }
  .card-ctr { font-family:'DM Mono',monospace; font-size:.8rem; color:var(--muted);
    min-width:70px; text-align:center; }

  /* bottom */
  .bottom-row { display:flex; gap:.5rem; flex-wrap:wrap; justify-content:center; padding:.3rem 1rem 2rem; }
  .bot-btn { font-family:'Playfair Display',serif; font-weight:700; font-size:.75rem;
    padding:.38rem 1rem; border-radius:3px; border:1px solid var(--border);
    background:var(--card); color:var(--muted); cursor:pointer; transition:all .2s; }
  .bot-btn:hover { border-color:var(--gold); color:var(--gold); }
</style>
</head>
<body>
<header>
  <h1>Flashcard Deck</h1>
  <p>Nationalism in India · History Ch.2 · 36 Cards · Tap to flip</p>
</header>

<div class="prog-row">
  <div class="prog-bar"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
  <div class="prog-text" id="prog-text">0 / 36</div>
</div>

<div class="filters">
  <button class="f-btn f-all on" onclick="setFilter('all',this)">All (36)</button>
  <button class="f-btn f-ncm"  onclick="setFilter('ncm',this)">🔥 Non-Cooperation</button>
  <button class="f-btn f-cdm"  onclick="setFilter('cdm',this)">🌊 Civil Disobedience</button>
  <button class="f-btn f-lead" onclick="setFilter('lead',this)">👤 Leaders</button>
  <button class="f-btn f-grp"  onclick="setFilter('grp',this)">👥 Social Groups</button>
  <button class="f-btn f-evt"  onclick="setFilter('evt',this)">📅 Events & Facts</button>
</div>

<div class="stage">
  <div class="fc-wrap" id="fc" onclick="flip()">
    <div class="fc-face fc-front">
      <div class="fc-tag" id="fc-tag"></div>
      <div class="fc-q" id="fc-q"></div>
      <div class="fc-hint" id="fc-hint"></div>
      <div class="fc-flip-hint">tap to reveal →</div>
    </div>
    <div class="fc-face fc-back">
      <div class="fc-date" id="fc-date" style="display:none"></div>
      <div class="fc-ans-lbl">✅ Answer</div>
      <div class="fc-ans" id="fc-ans"></div>
      <div class="known-badge" id="known-badge" style="display:none"></div>
    </div>
  </div>
</div>

<div class="nav-row">
  <button class="nav-btn" id="prev-btn" onclick="move(-1)" disabled>← Prev</button>
  <div class="card-ctr" id="ctr">1 / 36</div>
  <button class="nav-btn" id="next-btn" onclick="move(1)">Next →</button>
</div>

<div class="bottom-row">
  <button class="bot-btn" onclick="markKnown(true)">✓ Know it</button>
  <button class="bot-btn" onclick="markKnown(false)">✗ Still learning</button>
  <button class="bot-btn" onclick="shuffle()">⇄ Shuffle</button>
  <button class="bot-btn" onclick="resetDeck()">↺ Reset</button>
</div>

<script>
const CARDS = [
  // NCM
  {cat:'ncm', q:'When was the Non-Cooperation Movement launched and who led it?',
   date:'1920–1922', a:'<strong>1920</strong> — Led by <strong>Mahatma Gandhi</strong>. The first mass non-violent movement against British rule. Allied with Khilafat Movement for Hindu-Muslim unity.', hint:'First mass movement Gandhi led'},
  {cat:'ncm', q:'What was the Khilafat issue and why did Gandhi ally with it?',
   a:'Muslims feared British would dismantle the Ottoman Caliphate after WWI, humiliating the Khalifa (Caliph). Gandhi saw it as an opportunity to <strong>forge Hindu-Muslim unity</strong> against the British.', hint:'Khalifa = Islamic Caliph; Ottoman Empire defeated in WWI'},
  {cat:'ncm', q:'What happened at Jallianwala Bagh on April 13, 1919?',
   date:'April 13, 1919', a:'General Dyer ordered troops to <strong>fire on an unarmed peaceful crowd</strong> in Amritsar. Hundreds were killed. Nationwide outrage followed. Rabindranath Tagore renounced his knighthood in protest.', hint:'Triggered the Non-Cooperation Movement'},
  {cat:'ncm', q:'List four things Indians did during the Non-Cooperation Movement.',
   a:'1. <strong>Surrendered titles</strong> given by British\n2. <strong>Boycotted</strong> courts, schools, government services\n3. <strong>Burned foreign cloth</strong> and adopted khadi\n4. <strong>Picketed liquor shops</strong>; lawyers gave up legal practice', hint:'All forms of non-violent non-cooperation'},
  {cat:'ncm', q:'Why did Gandhi call off the Non-Cooperation Movement in 1922?',
   date:'February 1922', a:'The <strong>Chauri Chaura incident</strong> — an angry mob burned a police station in Gorakhpur (UP), killing 22 policemen. Gandhi felt people were not ready for non-violent struggle and suspended the movement.', hint:'Violence by protesters ended the movement'},
  {cat:'ncm', q:'What is Satyagraha? Who developed this idea?',
   a:'Satyagraha means <strong>"truth-force"</strong> or "soul-force." Developed by <strong>Gandhi</strong>. It is active non-violent resistance — the oppressor must be converted through suffering and moral force, not physical force.', hint:'Satya = truth; Agraha = insistence'},
  {cat:'ncm', q:'What was the Rowlatt Act of 1919?',
   date:'1919', a:'A law that gave the British government power to <strong>arrest and imprison anyone without trial</strong> or jury. Called the "Black Act" by Indians. Gandhi called for a nationwide hartal (strike) on April 6, 1919.', hint:'No trial, no jury — arrested on suspicion'},
  {cat:'ncm', q:'Which peasant movements were associated with Gandhi before the NCM?',
   a:'<strong>Champaran Satyagraha (1917)</strong> — indigo farmers in Bihar forced to grow indigo. <strong>Kheda Satyagraha (1918)</strong> — Gujarat farmers demanded revenue remission after crop failure.', hint:'Champaran = indigo; Kheda = revenue'},

  // CDM
  {cat:'cdm', q:'When was the Civil Disobedience Movement launched? What was its key symbol?',
   date:'1930–1934', a:'Launched in <strong>1930</strong>. Key symbol: <strong>Salt — the Dandi March</strong>. Gandhi marched 240 miles to Dandi coast to make salt from seawater, defying the British salt law.', hint:'Salt chosen because everyone needs it — even the poorest'},
  {cat:'cdm', q:'Describe the Dandi March.',
   date:'March 12 – April 5, 1930', a:'Gandhi marched <strong>240 miles</strong> from Sabarmati Ashram to Dandi, Gujarat with 78 followers. Reached the coast on April 5, 1930, and made salt — breaking the salt law. Triggered nationwide civil disobedience.', hint:'78 followers, 240 miles, 24 days'},
  {cat:'cdm', q:'How was CDM different from NCM in terms of method?',
   a:'NCM = <strong>boycott</strong> of British institutions. CDM = <strong>break specific unjust laws openly</strong>. CDM was more defiant — participants actively violated laws (salt, forest laws, revenue) and invited arrest.', hint:'NCM = refuse to cooperate; CDM = actively break laws'},
  {cat:'cdm', q:'What was the Gandhi-Irwin Pact of 1931?',
   date:'March 1931', a:'Gandhi agreed to <strong>suspend CDM</strong> and attend the 2nd Round Table Conference in London. British agreed to <strong>release political prisoners</strong>. The RTC failed — Gandhi\'s demands were rejected.', hint:'Suspended, not withdrawn — CDM relaunched in 1932'},
  {cat:'cdm', q:'Which groups participated more in CDM than in NCM?',
   a:'<strong>Women</strong> — in very large numbers for the first time.\n<strong>Rich peasants</strong> (Patidars of Gujarat, Jats of UP) — hit by the Great Depression.\n<strong>Merchants</strong> — hurt by foreign trade competition.', hint:'Depression + salt = wider rural participation'},
  {cat:'cdm', q:'Which groups largely stayed away from CDM and why?',
   a:'<strong>Dalits (untouchables)</strong> — felt Congress didn\'t address caste discrimination strongly enough. <strong>Many Muslims</strong> — distrust after Khilafat ended; communal tensions had grown since early 1920s.', hint:'CDM was more Hindu-dominated than NCM'},
  {cat:'cdm', q:'When was Purna Swaraj (complete independence) declared as Congress\'s goal?',
   date:'December 1929', a:'At the <strong>Lahore Session</strong> of the Indian National Congress in December 1929, under <strong>Jawaharlal Nehru\'s</strong> presidency. January 26, 1930 was declared Independence Day — celebrated annually until 1947.', hint:'January 26 later became Republic Day (1950)'},
  {cat:'cdm', q:'What was the Quit India Movement? When was it launched?',
   date:'August 8, 1942', a:'Gandhi\'s "<strong>Do or Die</strong>" call — August Kranti. Congress demanded immediate British withdrawal. All leaders were arrested. Underground networks, youth, and local leaders took over the movement.', hint:'Most radical movement; parallel governments in some areas'},

  // LEADERS
  {cat:'lead', q:'Who was Mahatma Gandhi and what was his role in Indian nationalism?',
   a:'Arrived from South Africa in <strong>1915</strong>. Political mentor: Gokhale. Led NCM (1920), CDM (1930), Quit India (1942). Developed Satyagraha. Wore khadi as symbol of self-reliance. Represented the masses.', hint:'Central unifying figure of the independence movement'},
  {cat:'lead', q:'What was the role of Jawaharlal Nehru in the independence movement?',
   a:'Led the <strong>youth wing</strong> of Congress. Presided over <strong>Lahore Session (1929)</strong> — declared Purna Swaraj. Closely associated with Gandhi but had socialist inclinations. Became India\'s first Prime Minister.', hint:'Purna Swaraj = his biggest contribution to the movement'},
  {cat:'lead', q:'Who was Subhas Chandra Bose and how did he differ from Gandhi?',
   a:'Radical nationalist. Founded the <strong>Indian National Army (INA)</strong>. Famous quote: <em>"Give me blood, I will give you freedom."</em> Resigned from Congress presidency in 1939 — disagreed with Gandhi\'s non-violent approach.', hint:'Believed in armed resistance unlike Gandhi'},
  {cat:'lead', q:'What was Dr. B.R. Ambedkar\'s role in the independence movement?',
   a:'Led the <strong>Dalit (untouchable)</strong> movement. Founded Depressed Classes Association. Demanded <strong>separate electorate</strong> for Dalits at Round Table Conferences. <strong>Poona Pact (1932)</strong> with Gandhi — reserved seats instead of separate electorate.', hint:'Fought for Dalit rights; opposed Gandhi on separate electorate'},
  {cat:'lead', q:'What was Alluri Sitaram Raju famous for?',
   a:'Led a <strong>tribal rebellion in Andhra Pradesh</strong> (Gudem Hills) using guerrilla warfare. Connected colonial exploitation to nationalist ideas. British forest laws had restricted tribal rights — he inspired tribals to resist.', hint:'Tribal leader who linked local grievances to nationalism'},

  // SOCIAL GROUPS
  {cat:'grp', q:'Why did peasants and farmers join the Civil Disobedience Movement?',
   a:'Hit by the <strong>Great Depression (1930s)</strong> — crop prices fell sharply but revenue demands stayed high. Couldn\'t pay rent to zamindars. Rich peasants like <strong>Patidars (Gujarat)</strong> and <strong>Jats (UP)</strong> joined strongly.', hint:'Depression = economic desperation = political action'},
  {cat:'grp', q:'How did women participate in the independence movement?',
   a:'Women participated <strong>massively in CDM</strong> — made salt, picketed foreign cloth and liquor shops, courted arrest. This was a <strong>major shift</strong> — moved from domestic sphere to public political life for the first time at scale.', hint:'CDM > NCM in terms of women\'s participation'},
  {cat:'grp', q:'How did tribal people relate to the independence movement?',
   a:'British <strong>forest laws</strong> restricted tribals\' traditional rights (grazing, firewood, farming). They saw the colonial state as the enemy. Alluri Sitaram Raju in Andhra connected their local struggle to wider nationalism.', hint:'Forest laws = main grievance; Gudem Hills rebellion'},
  {cat:'grp', q:'Why were industrial workers cautious participants in the movement?',
   a:'Workers wanted <strong>class struggle</strong> — against factory owners too. But Congress wanted <strong>national unity</strong> above class conflict, as it depended on industrialist donations. Workers participated in NCM (Nagpur mills, 1920) but Congress kept distance.', hint:'Class conflict vs. national unity — Congress chose the latter'},
  {cat:'grp', q:'Why did Dalits stay away from CDM? What was the Poona Pact?',
   a:'Congress didn\'t strongly support Dalit demands — feared alienating upper castes. Ambedkar demanded <strong>separate electorate</strong> at RTC. <strong>Poona Pact (1932)</strong>: Gandhi fasted against it; compromise reached — <strong>reserved seats</strong> within general electorate instead.', hint:'Separate electorate vs reserved seats — key distinction'},

  // EVENTS & FACTS
  {cat:'evt', q:'What was the significance of January 26, 1930?',
   date:'January 26, 1930', a:'Declared as <strong>Independence Day</strong> by the Indian National Congress after the Lahore Session. Across India, tricolour was hoisted and Purna Swaraj pledge was read. This date later became <strong>Republic Day</strong> (1950).', hint:'Same date — Independence Day 1930, Republic Day 1950'},
  {cat:'evt', q:'Why was salt chosen as the symbol for the Civil Disobedience Movement?',
   a:'Salt was taxed heavily by British — making it illegal to produce salt independently. Every Indian — rich or poor, Hindu or Muslim — needed salt. It was a <strong>universal symbol of oppression</strong> and thus united all sections.', hint:'Universality = everyone needs salt; tax = injustice'},
  {cat:'evt', q:'Who painted Bharat Mata and what did she represent?',
   a:'<strong>Abanindranath Tagore</strong> painted Bharat Mata as a serene, ascetic figure in a sari. Inspired by Bankim Chandra Chattopadhyay\'s writings. She represented the <strong>nation as a mother goddess</strong> — sacred, to be served and protected.', hint:'Bankim = wrote about her; Abanindranath = painted her'},
  {cat:'evt', q:'What was Vande Mataram and why was it controversial?',
   a:'A song by <strong>Bankim Chandra Chattopadhyay</strong> meaning "Hail to the Motherland." Sung at nationalist gatherings. Some <strong>Muslims objected</strong> — it seemed to worship a Hindu goddess figure, making it a symbol of Hindu nationalism.', hint:'Unity symbol that became divisive — important for board exams'},
  {cat:'evt', q:'What was khadi and why did Gandhi promote it?',
   a:'Khadi = <strong>hand-spun, hand-woven cloth</strong>. Gandhi promoted it as a symbol of <strong>self-reliance</strong> and rejection of British mill cloth. Spinning the charkha (wheel) became a daily practice. Also provided income to poor village workers.', hint:'Economic + political + symbolic significance'},
  {cat:'evt', q:'What was the Hunter Commission? Why were Indians unhappy with it?',
   date:'1919', a:'A British commission set up to investigate the <strong>Jallianwala Bagh massacre</strong>. Indians felt it was a <strong>whitewash</strong> — Dyer was reprimanded but not severely punished. The commission was seen as the British protecting their own.', hint:'No real justice = deepened distrust of British rule'},
  {cat:'evt', q:'What was the significance of the Lahore Session of the Indian National Congress?',
   date:'December 1929', a:'Presided by <strong>Jawaharlal Nehru</strong>. Declared <strong>Purna Swaraj</strong> (complete independence) as Congress\'s goal — shifting from "self-rule within Empire" to full independence. Set January 26 as Independence Day.', hint:'Before this, Congress wanted Dominion Status — not full independence'},
  {cat:'evt', q:'How did the Great Depression (1930) affect the Indian independence movement?',
   date:'1930s', a:'Farm prices <strong>collapsed</strong> but revenue demands stayed high. Peasants and farmers couldn\'t pay rents. This economic desperation pushed large sections of rural India — especially rich peasants — to actively join the CDM.', hint:'Economic misery + political movement = mass participation'},
  {cat:'evt', q:'What was the Round Table Conference? Why did it fail for Gandhi?',
   date:'1931', a:'British-organized conference in London to discuss India\'s future constitution. Gandhi attended the <strong>2nd RTC (1931)</strong> as sole Congress representative. Failed — British had invited many others (princes, communalists, Ambedkar). Gandhi\'s demands were rejected.', hint:'Gandhi felt isolated and humiliated — relaunched CDM on return'},
];

let deck=[...CARDS], idx=0, filter='all', known={}, isFlipped=false;

const TAG_STYLE={
  ncm:'background:rgba(249,115,22,.15);color:#fb923c',
  cdm:'background:rgba(56,189,248,.15);color:#38bdf8',
  lead:'background:rgba(34,197,94,.15);color:#4ade80',
  grp:'background:rgba(217,70,239,.15);color:#e879f9',
  evt:'background:rgba(245,200,66,.15);color:#f5c842',
};
const TAG_LBL={ncm:'🔥 NCM',cdm:'🌊 CDM',lead:'👤 Leader',grp:'👥 Social Groups',evt:'📅 Event/Fact'};

function filtered(){return filter==='all'?deck:deck.filter(c=>c.cat===filter);}

function setFilter(f,btn){
  filter=f; idx=0; isFlipped=false;
  document.getElementById('fc').classList.remove('flipped');
  document.querySelectorAll('.f-btn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  updateCard();
}

function updateCard(){
  const cards=filtered(); if(!cards.length)return;
  const c=cards[idx%cards.length], total=cards.length, cur=(idx%total)+1;
  document.getElementById('fc-tag').style.cssText=TAG_STYLE[c.cat];
  document.getElementById('fc-tag').textContent=TAG_LBL[c.cat];
  document.getElementById('fc-q').textContent=c.q;
  document.getElementById('fc-hint').textContent=c.hint?'💡 '+c.hint:'';
  document.getElementById('fc-ans').innerHTML=(c.a||'').replace(/\n/g,'<br>');
  const dateEl=document.getElementById('fc-date');
  if(c.date){dateEl.style.display='block';dateEl.textContent='📅 '+c.date;}
  else dateEl.style.display='none';
  const kb=document.getElementById('known-badge');
  const id=deck.indexOf(c);
  if(known[id]===true){kb.style.display='block';kb.className='known-badge known';kb.textContent='✓ Known';}
  else if(known[id]===false){kb.style.display='block';kb.className='known-badge unknown';kb.textContent='Still learning';}
  else kb.style.display='none';
  document.getElementById('ctr').textContent=`${cur} / ${total}`;
  document.getElementById('prog-text').textContent=`${cur} / ${total}`;
  document.getElementById('prog-fill').style.width=`${(cur/total)*100}%`;
  document.getElementById('prev-btn').disabled=idx===0;
  document.getElementById('next-btn').disabled=idx>=total-1;
}

function flip(){isFlipped=!isFlipped;document.getElementById('fc').classList.toggle('flipped',isFlipped);}
function move(dir){const t=filtered().length;idx=Math.max(0,Math.min(t-1,idx+dir));isFlipped=false;document.getElementById('fc').classList.remove('flipped');updateCard();}
function markKnown(val){const cards=filtered();const c=cards[idx%cards.length];const id=deck.indexOf(c);known[id]=val;updateCard();if(val)setTimeout(()=>move(1),400);}
function shuffle(){for(let i=deck.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[deck[i],deck[j]]=[deck[j],deck[i]];}idx=0;isFlipped=false;document.getElementById('fc').classList.remove('flipped');updateCard();}
function resetDeck(){deck=[...CARDS];known={};idx=0;isFlipped=false;document.getElementById('fc').classList.remove('flipped');updateCard();}
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight')move(1);else if(e.key==='ArrowLeft')move(-1);else if(e.key===' '){e.preventDefault();flip();}});
updateCard();
</script>
</body>
</html>
